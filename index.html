<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agrinter Cereales - Terminal Unificada v2.6</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        
        /* FIX: Definición de animación para el Ticker de Chicago */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            width: fit-content;
            animation: marquee 30s linear infinite;
        }
        .animate-marquee:hover { animation-play-state: paused; }

        .bg-agrinter { background-color: #0f172a; }
        .text-yellow-agrinter { color: #facc15; }
        .border-yellow-agrinter { border-color: #facc15; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [activeView, setActiveView] = useState('COBERTURAS');
            const [activeGrain, setActiveGrain] = useState('SOJA');

            // Data Engine: Centralizamos la información del mercado
            const marketData = {
                SOJA: [
                    { pos: "MAY26", strike: 325, prima: 4.5, tipo: "PUT", delta: "Defensivo" },
                    { pos: "JUL26", strike: 332, prima: 5.2, tipo: "PUT", delta: "Equilibrado" },
                    { pos: "NOV26", strike: 345, prima: 6.8, tipo: "PUT", delta: "Agresivo" }
                ],
                MAIZ: [
                    { pos: "JUL26", strike: 185, prima: 3.1, tipo: "PUT", delta: "Defensivo" },
                    { pos: "SEP26", strike: 192, prima: 4.0, tipo: "PUT", delta: "Equilibrado" }
                ],
                TRIGO: [
                    { pos: "ENE26", strike: 215, prima: 4.8, tipo: "PUT", delta: "Defensivo" }
                ]
            };

            const tickerItems = [
                { s: "SOJA MAY26", v: "325.5", d: "+1.2" },
                { s: "MAIZ JUL26", v: "189.0", d: "-0.5" },
                { s: "TRIGO ENE26", v: "212.0", d: "+0.8" },
                { s: "DLR MAYORISTA", v: "885.4", d: "+0.2" },
                { s: "BRL/USD", v: "4.92", d: "-0.15" }
            ];

            useEffect(() => { 
                lucide.createIcons(); 
            }, [activeView, activeGrain]);

            return (
                <div className="min-h-screen flex flex-col">
                    
                    {/* TOP TICKER BAR - Refactorizado para loop infinito */}
                    <div className="bg-slate-900 text-white overflow-hidden py-2 border-b border-slate-700 flex">
                        <div className="animate-marquee whitespace-nowrap gap-12 px-4 text-[11px] font-mono">
                            {[...tickerItems, ...tickerItems].map((t, i) => (
                                <span key={i} className="flex items-center gap-2">
                                    <b className="text-slate-400">{t.s}</b> 
                                    <span className="font-black">{t.v}</span> 
                                    <span className={t.d.includes('+') ? 'text-green-400' : 'text-red-400'}>
                                        {t.d.includes('+') ? '▲' : '▼'} {t.d}%
                                    </span>
                                </span>
                            ))}
                        </div>
                    </div>

                    <header className="bg-white border-b-2 border-slate-100 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-slate-900 text-yellow-400 w-12 h-12 flex items-center justify-center font-black text-2xl border-b-4 border-yellow-400">A</div>
                                <div>
                                    <h1 className="text-2xl font-black uppercase leading-none tracking-tighter text-slate-900">Agrinter Cereales</h1>
                                    <p className="text-[10px] text-slate-400 font-bold tracking-[0.3em] uppercase">Intelligence & Risk Management</p>
                                </div>
                            </div>
                            
                            <nav className="flex bg-slate-50 p-1 rounded-lg border border-slate-200">
                                {['COBERTURAS', 'MERCADOS', 'INFORMES', 'LOGISTICA'].map(v => (
                                    <button key={v} onClick={() => setActiveView(v)}
                                        className={`px-5 py-2 text-[10px] font-black tracking-widest transition-all rounded-md ${activeView === v ? 'bg-slate-900 text-yellow-400 shadow-lg' : 'text-slate-500 hover:bg-slate-200'}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8 flex-grow w-full">
                        
                        {activeView === 'COBERTURAS' && (
                            <section className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 border-b border-slate-200 pb-6 gap-4">
                                    <div>
                                        <div className="flex items-center gap-2 mb-1">
                                            <span className="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></span>
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Matba Rofex en tiempo real</span>
                                        </div>
                                        <h2 className="text-4xl font-black text-slate-900 italic uppercase leading-none">Gestión de Riesgo</h2>
                                        <p className="text-slate-500 text-sm mt-2">Seleccione su activo para ver estrategias de piso asegurado.</p>
                                    </div>
                                    <div className="flex bg-slate-900 p-1.5 rounded-xl shadow-inner">
                                        {['SOJA', 'TRIGO', 'MAIZ'].map(g => (
                                            <button key={g} onClick={() => setActiveGrain(g)}
                                                className={`px-8 py-2.5 text-[11px] font-black rounded-lg transition-all ${activeGrain === g ? 'bg-yellow-400 text-slate-900' : 'text-slate-400 hover:text-white'}`}>{g}</button>
                                        ))}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    {marketData[activeGrain].map((item, i) => (
                                        <div key={i} className="bg-white border border-slate-200 rounded-2xl shadow-xl hover:shadow-2xl transition-all group overflow-hidden flex flex-col">
                                            <div className="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center">
                                                <span className="text-[11px] font-black text-slate-900 bg-yellow-400 px-3 py-1 rounded-full uppercase tracking-tighter">Posición {item.pos}</span>
                                                <span className="text-[10px] font-bold text-slate-400">{item.tipo} COMPRADO</span>
                                            </div>
                                            
                                            <div className="p-8 flex-grow">
                                                <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">Piso Garantizado (u$s)</p>
                                                <div className="text-7xl font-black text-slate-900 tracking-tighter mb-6">{item.strike}</div>
                                                
                                                <div className="space-y-3 mb-8">
                                                    <div className="flex justify-between text-xs border-b border-slate-50 pb-2">
                                                        <span className="text-slate-500 font-medium">Costo de Prima:</span>
                                                        <span className="font-black text-slate-900">u$s {item.prima}</span>
                                                    </div>
                                                    <div className="flex justify-between text-xs border-b border-slate-50 pb-2">
                                                        <span className="text-slate-500 font-medium">Perfil de Riesgo:</span>
                                                        <span className={`font-black ${item.delta === 'Agresivo' ? 'text-red-500' : 'text-green-600'}`}>{item.delta}</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <button className="w-full bg-slate-900 text-white py-5 text-xs font-black tracking-[0.2em] uppercase group-hover:bg-yellow-400 group-hover:text-slate-900 transition-all flex items-center justify-center gap-2">
                                                <i data-lucide="shield-check" className="w-4 h-4"></i>
                                                Fijar Cobertura
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {activeView === 'MERCADOS' && (
                            <section className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-in slide-in-from-right duration-500">
                                <div className="lg:col-span-2 space-y-6">
                                    <div className="bg-slate-900 rounded-2xl p-8 text-white shadow-2xl relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-8 opacity-10">
                                            <i data-lucide="bar-chart-3" className="w-32 h-32 text-white"></i>
                                        </div>
                                        <h3 className="text-xl font-black italic mb-6 border-l-4 border-yellow-400 pl-4 tracking-tighter uppercase">Monitor de Arbitraje Spot/Futuro</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
                                            <div className="bg-slate-800/50 rounded-xl p-6 border border-slate-700">
                                                <p className="text-[10px] text-slate-400 font-black uppercase mb-1">Maíz Spot Rosario</p>
                                                <p className="text-3xl font-black text-white">u$s 187.5 <span className="text-xs text-slate-500 font-normal">/ tn</span></p>
                                            </div>
                                            <div className="bg-slate-800/50 rounded-xl p-6 border border-slate-700">
                                                <p className="text-[10px] text-slate-400 font-black uppercase mb-1">Tasa de Pase (TNA)</p>
                                                <p className="text-3xl font-black text-green-400">42.5%</p>
                                            </div>
                                        </div>
                                        <div className="mt-6 p-4 bg-yellow-400/10 border border-yellow-400/20 rounded-lg">
                                            <p className="text-[10px] text-yellow-400 font-bold uppercase italic">
                                                Tip CBOT: La tasa de pase actual supera la inflación proyectada en USD. Momento óptimo para arbitrar mercadería física vs futuro.
                                            </p>
                                        </div>
                                    </div>
                                    <div className="bg-white border-2 border-slate-100 rounded-2xl p-6 h-80 flex flex-col items-center justify-center">
                                        <div className="w-full flex justify-between items-center mb-8 px-4 text-slate-400 font-black text-[10px] uppercase">
                                            <span>Spot</span><span>MAY26</span><span>JUL26</span><span>NOV26</span>
                                        </div>
                                        <div className="w-full h-1 bg-slate-100 relative rounded-full">
                                            <div className="absolute left-0 top-1/2 -translate-y-1/2 w-4 h-4 bg-slate-900 rounded-full"></div>
                                            <div className="absolute left-1/3 top-1/2 -translate-y-1/2 w-4 h-4 bg-slate-900 rounded-full"></div>
                                            <div className="absolute left-2/3 top-1/2 -translate-y-1/2 w-4 h-4 bg-yellow-400 rounded-full ring-4 ring-yellow-400/20"></div>
                                            <div className="absolute left-full top-1/2 -translate-y-1/2 w-4 h-4 bg-slate-900 rounded-full"></div>
                                        </div>
                                        <p className="mt-8 text-slate-300 font-black uppercase text-xs tracking-[0.3em]">Curva de Carry - MatbaRofex</p>
                                    </div>
                                </div>
                                
                                <div className="space-y-4">
                                    <h4 className="font-black text-xs uppercase border-l-4 border-slate-900 pl-3 mb-6">Chicago Board of Trade Analysis</h4>
                                    {[1, 2, 3].map(n => (
                                        <div key={n} className="bg-white p-5 rounded-xl border border-slate-100 shadow-sm hover:border-yellow-400 transition-all cursor-pointer">
                                            <div className="flex items-center gap-2 mb-2">
                                                <span className="w-2 h-2 bg-blue-500 rounded-full"></span>
                                                <b className="text-[10px] text-slate-900 uppercase">Mercado Externo</b>
                                            </div>
                                            <p className="text-xs text-slate-600 leading-relaxed">Informes USDA sugieren una reducción de stock en {n === 1 ? 'Soja' : 'Maíz'}. Posible presión alcista en CBOT.</p>
                                            <p className="text-[9px] text-slate-400 mt-3 font-bold uppercase">Hace 15 minutos</p>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}
                        
                        {/* Otras secciones simplificadas por espacio */}
                        {(activeView === 'INFORMES' || activeView === 'LOGISTICA') && (
                            <div className="h-96 bg-white border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center p-12 text-center">
                                <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-4">
                                    <i data-lucide="lock" className="w-8 h-8 text-slate-300"></i>
                                </div>
                                <h3 className="text-slate-900 font-black uppercase mb-2">Acceso Restringido</h3>
                                <p className="text-slate-500 text-sm max-w-xs">El módulo de {activeView} está disponible solo para clientes con cuenta comitente activa en Agrinter.</p>
                            </div>
                        )}

                    </main>

                    <footer className="bg-slate-900 text-white py-12 px-6">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12">
                            <div className="md:col-span-2">
                                <h5 className="text-yellow-400 font-black uppercase text-xl mb-6 tracking-tighter">Agrinter Cereales</h5>
                                <p className="text-[11px] text-slate-400 uppercase leading-relaxed font-bold tracking-widest max-w-sm">
                                    Terminal Rosario • Oficina Central CABA <br/>
                                    Especialistas en Futuros, Opciones y Corretaje Físico de Granos.
                                    Agente de Liquidación y Compensación propio.
                                </p>
                            </div>
                            <div className="flex flex-col gap-3">
                                <h5 className="text-white font-black uppercase text-xs mb-4 border-b border-slate-800 pb-2">Mesa de Operaciones</h5>
                                <button className="text-left text-[11px] font-bold text-slate-400 hover:text-yellow-400 transition-colors uppercase">M. Ambrosoni: +54 9 2317 472899</button>
                                <button className="text-left text-[11px] font-bold text-slate-400 hover:text-yellow-400 transition-colors uppercase">Mesa Rosario: +54 9 341 0000000</button>
                            </div>
                            <div className="text-left md:text-right">
                                <p className="text-[10px] font-black text-yellow-400 uppercase tracking-[0.4em] italic mb-2">AGRO QUANT v2.6</p>
                                <p className="text-[9px] text-slate-500 uppercase font-bold">Auditoría CBOT Chicago © 2026</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
