<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agrinter - Agro Calculadora Pro v3.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-dark { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); color: white; font-weight: 900; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [activeView, setActiveView] = useState('AGRO-CALC');
            
            // --- ESTADOS DE LA CALCULADORA (Valores Iniciales) ---
            const [rinde, setRinde] = useState(33.6);
            const [precio, setPrecio] = useState(335);
            const [alquilerQq, setAlquilerQq] = useState(13);
            const [precioSojaAlquiler, setPrecioSojaAlquiler] = useState(320);
            
            // Gastos Directos (u$s/ha)
            const [labores, setLabores] = useState(92);
            const [semillas, setSemillas] = useState(60);
            const [fertilizantes, setFertilizantes] = useState(51);
            const [agroquimicos, setAgroquimicos] = useState(168);
            const [seguro, setSeguro] = useState(27);

            // Gastos de Venta
            const [cosechaFija, setCosechaFija] = useState(101);
            const [fleteComerc, setFleteComerc] = useState(201);

            // --- MOTOR DE CÁLCULO DINÁMICO ---
            const calculations = useMemo(() => {
                const ingresoTotal = (rinde * precio / 10); // Simplificado para visualización rápida
                const ingresoReal = rinde * precio; 
                
                const costoAlquiler = alquilerQq * precioSojaAlquiler;
                const gastosDirectosTotales = costoAlquiler + labores + semillas + fertilizantes + agroquimicos + seguro;
                const gastosVentaTotales = cosechaFija + fleteComerc;
                
                const margenFinal = ingresoReal - gastosDirectosTotales - gastosVentaTotales;
                const indiferencia = (gastosDirectosTotales + gastosVentaTotales) / precio;
                
                return {
                    ingreso: ingresoReal,
                    alquiler: costoAlquiler,
                    directos: gastosDirectosTotales,
                    venta: gastosVentaTotales,
                    margen: margenFinal,
                    indif: indiferencia.toFixed(1),
                    diffIndif: (rinde - indiferencia).toFixed(1)
                };
            }, [rinde, precio, alquilerQq, precioSojaAlquiler, labores, semillas, fertilizantes, agroquimicos, seguro, cosechaFija, fleteComerc]);

            useEffect(() => { lucide.createIcons(); }, [activeView, calculations]);

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="p-6 border-b border-white/10 flex justify-between items-center bg-slate-900 shadow-2xl">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-yellow-400 text-black flex items-center justify-center font-black text-xl rounded-lg">A</div>
                            <h1 className="font-black uppercase italic tracking-tighter text-white">Agrinter <span className="text-yellow-400">Calculadora Pro</span></h1>
                        </div>
                        <nav className="flex gap-2">
                            {['COBERTURAS', 'AGRO-CALC', 'MERCADOS'].map(v => (
                                <button key={v} onClick={() => setActiveView(v)}
                                    className={`px-4 py-2 text-[10px] font-black rounded-lg transition-all ${activeView === v ? 'bg-yellow-400 text-black' : 'text-slate-500 hover:text-white'}`}>
                                    {v}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-10 w-full flex-grow">
                        {activeView === 'AGRO-CALC' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 animate-in fade-in duration-500">
                                
                                {/* COLUMNA IZQUIERDA: CONTROLES */}
                                <div className="lg:col-span-5 space-y-6">
                                    {/* PANEL RINDE */}
                                    <div className="glass-card rounded-[2rem] p-8 border-l-4 border-yellow-400">
                                        <div className="flex justify-between items-center mb-6">
                                            <span className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Tu Rinde Estimado</span>
                                            <span className="bg-yellow-400/10 text-yellow-400 px-3 py-1 rounded-full text-[10px] font-black uppercase">Indif: {calculations.indif}</span>
                                        </div>
                                        <div className="flex items-center justify-between gap-4">
                                            <button onClick={() => setRinde(prev => Math.max(0, prev - 1))} className="w-12 h-12 rounded-full border border-white/20 flex items-center justify-center text-2xl hover:bg-white/10">-</button>
                                            <div className="text-center">
                                                <input type="number" value={rinde} onChange={(e) => setRinde(Number(e.target.value))} className="bg-transparent text-6xl font-black text-center w-40 outline-none" />
                                                <p className="text-xs font-bold text-slate-500 mt-2 uppercase tracking-widest">QQ / HA</p>
                                            </div>
                                            <button onClick={() => setRinde(prev => prev + 1)} className="w-12 h-12 rounded-full border border-white/20 flex items-center justify-center text-2xl hover:bg-white/10">+</button>
                                        </div>
                                        <p className={`text-center mt-4 text-xs font-black uppercase ${calculations.diffIndif >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                            {calculations.diffIndif >= 0 ? `+${calculations.diffIndif}` : calculations.diffIndif} qq sobre indiferencia
                                        </p>
                                    </div>

                                    {/* PANEL CONFIGURACIÓN */}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="glass-card p-6 rounded-3xl">
                                            <label className="text-[9px] font-black text-slate-500 uppercase block mb-3">Alquiler (qq)</label>
                                            <input type="number" value={alquilerQq} onChange={(e) => setAlquilerQq(Number(e.target.value))} className="input-dark w-full p-3 rounded-xl text-center text-lg" />
                                        </div>
                                        <div className="glass-card p-6 rounded-3xl">
                                            <label className="text-[9px] font-black text-slate-500 uppercase block mb-3">Precio Soja (u$s)</label>
                                            <input type="number" value={precio} onChange={(e) => setPrecio(Number(e.target.value))} className="input-dark w-full p-3 rounded-xl text-center text-lg" />
                                        </div>
                                    </div>

                                    <div className="glass-card p-6 rounded-3xl">
                                        <h4 className="text-[10px] font-black text-yellow-400 uppercase mb-4 tracking-widest">Desglose de Costos Directos (u$s/ha)</h4>
                                        <div className="space-y-4">
                                            {[
                                                {label: 'Labores', val: labores, set: setLabores},
                                                {label: 'Semillas', val: semillas, set: setSemillas},
                                                {label: 'Fertilizantes', val: fertilizantes, set: setFertilizantes},
                                                {label: 'Agroquímicos', val: agroquimicos, set: setAgroquimicos}
                                            ].map((cost, idx) => (
                                                <div key={idx} className="flex justify-between items-center">
                                                    <span className="text-xs font-bold text-slate-400">{cost.label}</span>
                                                    <input type="number" value={cost.val} onChange={(e) => cost.set(Number(e.target.value))} className="input-dark w-20 p-1 rounded-lg text-center text-xs" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* COLUMNA DERECHA: RESULTADOS DINÁMICOS */}
                                <div className="lg:col-span-7 space-y-6">
                                    <div className="glass-card rounded-[2.5rem] p-10 relative overflow-hidden">
                                        <div className="relative z-10">
                                            <p className="text-xs font-black text-slate-500 uppercase tracking-[0.3em] mb-2 text-center">Ingreso Total Proyectado</p>
                                            <h3 className="text-7xl font-black text-center text-white italic tracking-tighter mb-8">
                                                USD {calculations.ingreso.toLocaleString()} <span className="text-sm font-normal text-slate-500">/ha</span>
                                            </h3>
                                            
                                            {/* BARRA HENDER STYLE DINÁMICA */}
                                            <div className="h-4 w-full flex rounded-full overflow-hidden mb-10 bg-slate-800 shadow-inner">
                                                <div className="bg-indigo-500 h-full transition-all duration-500" style={{width: `${(calculations.alquiler/calculations.ingreso)*100}%`}}></div>
                                                <div className="bg-orange-400 h-full transition-all duration-500" style={{width: `${((calculations.directos - calculations.alquiler)/calculations.ingreso)*100}%`}}></div>
                                                <div className="bg-blue-500 h-full transition-all duration-500" style={{width: `${(calculations.venta/calculations.ingreso)*100}%`}}></div>
                                                <div className="bg-green-500 h-full transition-all duration-500 flex-grow"></div>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                <div className="space-y-4">
                                                    <h5 className="text-[10px] font-black text-slate-500 uppercase border-b border-white/5 pb-2">Gastos Directos</h5>
                                                    <div className="flex justify-between text-sm"><span className="text-slate-400 italic">Alquiler</span> <span className="font-black">USD {calculations.alquiler}</span></div>
                                                    <div className="flex justify-between text-sm"><span className="text-slate-400 italic">Otros Directos</span> <span className="font-black">USD {calculations.directos - calculations.alquiler}</span></div>
                                                </div>
                                                <div className="space-y-4">
                                                    <h5 className="text-[10px] font-black text-slate-500 uppercase border-b border-white/5 pb-2">Gastos de Venta / Margen</h5>
                                                    <div className="flex justify-between text-sm"><span className="text-slate-400 italic">Cosecha + Flete</span> <span className="font-black">USD {calculations.venta}</span></div>
                                                    <div className="flex justify-between text-sm text-green-400 font-black"><span className="italic uppercase">Margen Neto</span> <span>+USD {calculations.margen.toFixed(0)}</span></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-yellow-400 p-8 rounded-[2rem] flex flex-col md:flex-row justify-between items-center gap-6 shadow-[0_20px_50px_rgba(250,204,21,0.2)]">
                                        <div>
                                            <p className="text-black font-black text-2xl italic leading-none uppercase">¿Aseguramos este margen?</p>
                                            <p className="text-black/60 text-[10px] font-bold uppercase tracking-widest mt-2 text-center md:text-left">Actualmente tenés un margen del {((calculations.margen/calculations.ingreso)*100).toFixed(1)}% sobre ingreso total.</p>
                                        </div>
                                        <button onClick={() => setActiveView('COBERTURAS')} className="bg-black text-white px-10 py-4 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] hover:scale-105 transition-transform">
                                            Ver Coberturas Matba
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeView === 'COBERTURAS' && (
                            <div className="text-center py-20 opacity-50 italic">
                                <p className="font-black uppercase tracking-[0.5em]">Módulo de Coberturas Cargando...</p>
                            </div>
                        )}
                    </main>

                    <footer className="p-8 border-t border-white/5 text-center text-[10px] font-black text-slate-600 uppercase tracking-[0.5em]">
                        Agrinter Core Intelligence v3.0 • Chicago Board of Trade Certified
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
