<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinter Cereales - Coberturas</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        // Importación de Firebase desde la web
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Configuración (Vercel inyectará esto)
        const firebaseConfig = JSON.parse(window.env?.VITE_FIREBASE_CONFIG || '{}');
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.renderApp(db, auth);
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        window.renderApp = (db, auth) => {
            const App = () => {
                const [activeTab, setActiveTab] = useState('Soja');
                const [isAdmin, setIsAdmin] = useState(false);
                const [marketData, setMarketData] = useState({
                    Soja: [{ mes: 'Julio 2026', futuro: 329, prima: 7, piso: 322 }],
                    Trigo: [{ mes: 'Dic 2026', futuro: 217, prima: 9, piso: 208 }],
                    Maiz: [{ mes: 'Dic 2026', futuro: 194, prima: 7, piso: 187 }]
                });

                useEffect(() => {
                    signInAnonymously(auth);
                    const docRef = doc(db, 'artifacts', 'agrinter-dashboard', 'public', 'data', 'marketValues', 'current');
                    return onSnapshot(docRef, (snap) => {
                        if (snap.exists()) setMarketData(snap.data().content);
                        lucide.createIcons();
                    });
                }, []);

                return (
                    <div className="min-h-screen bg-gray-50 pb-20">
                        <header className="bg-white border-b-4 border-yellow-400 p-4 mb-6 sticky top-0 z-50 shadow-sm">
                            <div className="max-w-6xl mx-auto flex justify-between items-center">
                                <div className="flex items-center gap-4">
                                    <div className="bg-black p-2 rounded text-yellow-400 font-black text-xl">A</div>
                                    <div>
                                        <h1 className="text-xl font-black uppercase leading-none">Agrinter Cereales</h1>
                                        <p className="text-[10px] text-gray-500 font-bold tracking-widest uppercase">Estrategias de Cobertura</p>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    {['Soja', 'Maiz', 'Trigo'].map(g => (
                                        <button key={g} onClick={() => setActiveTab(g)} 
                                            className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${activeTab === g ? 'bg-black text-yellow-400 shadow-md' : 'bg-gray-100 text-gray-400'}`}>
                                            {g}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </header>

                        <main className="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-6">
                            {marketData[activeTab].map((item, idx) => (
                                <div key={idx} className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                                    <div className="bg-yellow-400 px-5 py-3 font-black text-xs uppercase italic tracking-tight">Cobertura {activeTab} {item.mes}</div>
                                    <div className="p-8 text-center">
                                        <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Piso Asegurado Neto</p>
                                        <div className="text-6xl font-black text-gray-900 tracking-tighter"><span className="text-2xl mr-1 font-bold">u$d</span>{item.piso}</div>
                                    </div>
                                    <div className="p-6 bg-gray-50 border-t space-y-4">
                                        <button className="w-full bg-black text-yellow-400 py-4 rounded-xl font-black uppercase text-sm shadow-lg flex items-center justify-center gap-2">
                                            <i data-lucide="message-circle" class="w-5 h-5"></i> Consultar
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </main>

                        <footer className="mt-8 text-center">
                            <button onClick={() => setIsAdmin(!isAdmin)} className="text-[10px] text-gray-300 font-bold uppercase hover:text-yellow-600 transition-colors">
                                {isAdmin ? "Cerrar Editor" : "Modo Editor"}
                            </button>
                        </footer>
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };
    </script>
</body>
</html>
