<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinter Cereales - Coberturas</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .font-condensed { font-family: 'Roboto Condensed', sans-serif; }
    </style>
</head>
<body class="bg-white text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('Soja');
            const [selectedOperator, setSelectedOperator] = useState('Maximo');

            const marketData = {
                Soja: [
                    { mes: 'MAYO 2026', futuro: 325, prima: 8, strike: 330, piso: 317, fecha: '15/05/26' },
                    { mes: 'JULIO 2026', futuro: 329, prima: 7, strike: 332, piso: 322, fecha: '23/06/26' },
                    { mes: 'NOV 2026', futuro: 338, prima: 12, strike: 340, piso: 326, fecha: '23/10/26' }
                ],
                Trigo: [
                    { mes: 'ENE 2026', futuro: 210, prima: 6, strike: 212, piso: 204, fecha: '15/12/25' },
                    { mes: 'MAR 2026', futuro: 215, prima: 8, strike: 218, piso: 207, fecha: '20/02/26' }
                ],
                Maiz: [
                    { mes: 'ABR 2026', futuro: 185, prima: 5, strike: 188, piso: 180, fecha: '15/03/26' },
                    { mes: 'JUL 2026', futuro: 192, prima: 7, strike: 195, piso: 185, fecha: '20/06/26' }
                ]
            };

            const operators = {
                'Gonzalo': { name: 'Gonza', phone: '5493410000000' },
                'Maximo': { name: 'Maximo', phone: '5492317472899' } 
            };

            useEffect(() => { lucide.createIcons(); }, [activeTab]);

            return (
                <div className="min-h-screen">
                    {/* Header Ejecutivo (Foto 1) */}
                    <header className="bg-white border-b-2 border-slate-100 p-4 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-slate-900 text-yellow-400 w-10 h-10 flex items-center justify-center font-black text-xl border-b-2 border-yellow-400">A</div>
                                <div>
                                    <h1 className="text-lg font-black uppercase leading-none tracking-tight">Agrinter Cereales</h1>
                                    <p className="text-[9px] text-slate-400 font-bold tracking-[0.2em] uppercase">Estrategias de Cobertura</p>
                                </div>
                            </div>
                            
                            <div className="flex bg-slate-50 p-1 rounded-full border">
                                {['Soja', 'Trigo', 'Maiz'].map(g => (
                                    <button key={g} onClick={() => setActiveTab(g)} 
                                        className={`px-6 py-1.5 rounded-full text-[11px] font-bold uppercase transition-all ${activeTab === g ? 'bg-slate-900 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>{g}</button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 py-10">
                        {/* Selector Operador (Margen Derecho - Foto 1) */}
                        <div className="flex justify-end mb-10">
                            <div className="flex items-center gap-3 bg-white border border-slate-100 p-1.5 rounded-xl shadow-sm">
                                <span className="text-[9px] font-bold text-slate-400 uppercase px-2">Consultar con:</span>
                                {Object.keys(operators).map(op => (
                                    <button key={op} onClick={() => setSelectedOperator(op)}
                                        className={`px-5 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${selectedOperator === op ? 'bg-slate-100 text-slate-900 shadow-inner' : 'text-slate-300 hover:text-slate-500'}`}>{op}</button>
                                ))}
                            </div>
                        </div>

                        {/* Grid de Coberturas (Mix: Estructura Foto 3 + Datos Foto Amarillo) */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16">
                            {marketData[activeTab].map((item, idx) => (
                                <div key={idx} className="bg-white border border-slate-100 rounded-sm shadow-sm flex flex-col transition-all hover:border-yellow-400 hover:shadow-lg">
                                    {/* Subtítulo Sutil (Foto 3) */}
                                    <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                        <span className="font-black text-[10px] uppercase tracking-wider text-slate-600">{item.mes}</span>
                                        <div className="bg-yellow-400/10 text-yellow-700 px-2 py-0.5 rounded text-[8px] font-bold uppercase tracking-tight">A3 Cobertura</div>
                                    </div>

                                    {/* Precio Piso (Foto 3) */}
                                    <div className="p-8 text-center border-b border-slate-100">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Precio Piso Asegurado</p>
                                        <div className="text-6xl font-black text-slate-900 font-condensed tracking-tighter flex items-baseline justify-center">
                                            <span className="text-xl mr-1 font-bold text-slate-400">U$D</span>{item.piso}
                                        </div>
                                        <p className="text-[9px] font-bold text-slate-300 uppercase italic mt-1 tracking-tighter">Vence: {item.fecha}</p>
                                    </div>

                                    {/* Detalle Técnico Detallado (Como en tarjeta amarilla) */}
                                    <div className="p-6 space-y-4">
                                        <div className="bg-white border border-slate-100 p-5 rounded-lg space-y-4">
                                            <div className="flex justify-between items-center text-xs font-bold border-b border-slate-100 pb-3">
                                                <span className="flex items-center gap-2 text-slate-500 uppercase text-[9px] tracking-widest">
                                                    <i data-lucide="arrow-down-circle" className="w-4 h-4"></i> Venta Futuro
                                                </span>
                                                <span className="text-slate-800 font-condensed font-bold">U$D {item.futuro}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-xs font-bold border-b border-slate-100 pb-3">
                                                <span className="flex items-center gap-2 text-red-500 uppercase text-[9px] tracking-widest">
                                                    <i data-lucide="alert-circle" className="w-4 h-4"></i> Costo Seguro (Prima)
                                                </span>
                                                <span className="text-red-600 font-condensed font-bold">- U$D {item.prima}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-xs font-bold">
                                                <span className="flex items-center gap-2 text-green-600 uppercase text-[9px] tracking-widest">
                                                    <i data-lucide="trending-up" className="w-4 h-4"></i> Acompaña suba desde
                                                </span>
                                                <span className="text-green-700 font-condensed font-bold">U$D {item.strike}</span>
                                            </div>
                                        </div>

                                        <button onClick={() => window.open(`https://wa.me/${operators[selectedOperator].phone}`, '_blank')} 
                                            className="w-full bg-slate-900 text-white py-4 font-black uppercase text-[10px] tracking-[0.2em] shadow-md flex items-center justify-center gap-2 hover:bg-yellow-400 hover:text-slate-900 transition-all">
                                            <i data-lucide="message-circle" className="w-4 h-4 text-yellow-400"></i> Operar con {operators[selectedOperator].name}
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Banner Informativo Sobrio (Mix) */}
                        <section className="bg-slate-900 rounded-sm p-12 text-slate-100 shadow-xl mb-12 border-l-4 border-yellow-400">
                            <h2 className="text-xl font-black uppercase tracking-tight mb-4 flex items-center gap-3">
                                <i data-lucide="shield-check" className="text-yellow-400"></i> Put Sintético A3: Seguridad y Flexibilidad
                            </h2>
                            <p className="text-slate-400 text-sm leading-relaxed max-w-4xl italic">
                                Asegure hoy mismo un precio mínimo garantizado para su producción, manteniendo abierta la posibilidad de capturar cualquier alza del mercado. Operar en A3 Mercados le permite flexibilizar su logística comercial sin entregar físicamente la mercadería física.
                            </p>
                        </section>
                    </main>

                    <footer className="py-8 text-center bg-white border-t">
                        <p className="text-[9px] font-black text-slate-300 uppercase tracking-[0.4em] italic">AGRINTER CEREALES</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
