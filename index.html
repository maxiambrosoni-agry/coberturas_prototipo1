<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinter Cereales - Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('Soja');
            const [selectedOperator, setSelectedOperator] = useState('Maximo');
            const [isAdmin, setIsAdmin] = useState(false);
            const [marketData, setMarketData] = useState({
                Soja: [{ mes: 'Julio 2026', futuro: 329, strike: 332, prima: 7, piso: 322, fecha: '23/06/2026' }],
                Trigo: [{ mes: 'Dic 2026', futuro: 217, strike: 220, prima: 9, piso: 208, fecha: '20/11/2026' }],
                Maiz: [{ mes: 'Dic 2026', futuro: 194, strike: 196, prima: 7, piso: 187, fecha: '20/11/2026' }]
            });

            const operators = {
                'Gonzalo': { name: 'Gonza', phone: '5493410000000' },
                'Maximo': { name: 'Maximo', phone: '5492317472899' } 
            };

            useEffect(() => {
                lucide.createIcons();
            }, [activeTab, isAdmin]);

            const handleContact = (item) => {
                const op = operators[selectedOperator];
                const msg = `Hola ${op.name}, vi la cobertura de ${activeTab} ${item.mes}. Me interesa recibir mas informacion.`;
                window.open(`https://wa.me/${op.phone}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-white border-b-4 border-yellow-400 shadow-sm p-4 mb-6 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-black text-yellow-400 w-12 h-12 flex items-center justify-center rounded font-black text-2xl shadow-lg">A</div>
                                <div>
                                    <h1 className="text-xl font-black uppercase leading-none tracking-tighter">Agrinter Cereales</h1>
                                    <p className="text-[10px] text-gray-500 font-bold tracking-widest uppercase">Estrategias de Cobertura</p>
                                </div>
                            </div>
                            <div className="flex gap-1 bg-gray-100 p-1 rounded-full">
                                {['Soja', 'Maiz', 'Trigo'].map(g => (
                                    <button key={g} onClick={() => setActiveTab(g)} 
                                        className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${activeTab === g ? 'bg-black text-yellow-400' : 'text-gray-400'}`}>{g}</button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4">
                        <div className="flex justify-center mb-8">
                            <div className="bg-white p-1 rounded-xl shadow-sm border flex gap-1">
                                {Object.keys(operators).map(op => (
                                    <button key={op} onClick={() => setSelectedOperator(op)}
                                        className={`px-4 py-2 rounded-lg text-xs font-bold ${selectedOperator === op ? 'bg-gray-100 text-black' : 'text-gray-400'}`}>{op}</button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {(marketData[activeTab] || []).map((item, index) => (
                                <div key={index} className="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden transform transition-all hover:scale-[1.02]">
                                    <div className="bg-yellow-400 px-5 py-4 flex justify-between items-center">
                                        <span className="font-black text-sm uppercase italic">COBERTURA {activeTab} {item.mes}</span>
                                    </div>
                                    <div className="p-8 text-center">
                                        <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Piso Asegurado Neto</p>
                                        <div className="text-6xl font-black text-gray-900 tracking-tighter"><span className="text-2xl mr-1 font-bold">u$d</span>{item.piso}</div>
                                    </div>
                                    <div className="p-6 bg-gray-50 border-t space-y-4">
                                        <div className="flex justify-between text-sm font-bold border-b pb-2">
                                            <span className="text-gray-400 uppercase text-[10px]">Futuro</span>
                                            <span>u$d {item.futuro}</span>
                                        </div>
                                        <button onClick={() => handleContact(item)} className="w-full bg-black text-yellow-400 py-4 rounded-2xl font-black uppercase text-sm shadow-lg flex items-center justify-center gap-2">
                                            Consultar con {selectedOperator}
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
