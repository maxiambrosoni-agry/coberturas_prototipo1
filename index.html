<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agrinter Cereales - Terminal v3.2</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; overflow-x: hidden; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: flex; width: fit-content; animation: marquee 30s linear infinite; }
        .bg-agrinter { background-color: #0f172a; }
        .input-cal { border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; font-weight: 900; text-align: center; font-size: 1.25rem; width: 100%; outline: none; transition: border-color 0.2s; }
        .input-cal:focus { border-color: #facc15; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [activeView, setActiveView] = useState('CALCULADORA');
            const [activeGrain, setActiveGrain] = useState('SOJA 1°');

            // --- ESTADO DE LA CALCULADORA ---
            const [rinde, setRinde] = useState(33.6);
            const [precioVenta, setPrecioVenta] = useState(314.5);
            const [alquilerQq, setAlquilerQq] = useState(13);
            const [precioSojaAlquiler, setPrecioSojaAlquiler] = useState(314.5);

            const costosFijos = {
                labores: 92, semillas: 60, fertilizantes: 51,
                agroquimicos: 168, seguro: 27, cosecha: 101, flete: 201
            };

            const calcs = useMemo(() => {
                const ingresoTotal = rinde * precioVenta;
                const costoAlquiler = alquilerQq * precioSojaAlquiler;
                const directos = costoAlquiler + costosFijos.labores + costosFijos.semillas + costosFijos.fertilizantes + costosFijos.agroquimicos + costosFijos.seguro;
                const venta = costosFijos.cosecha + costosFijos.flete;
                const margen = ingresoTotal - directos - venta;
                const indiferencia = (directos + venta) / precioVenta;

                const getPct = (val) => ingresoTotal > 0 ? ((val / ingresoTotal) * 100).toFixed(1) : 0;

                return {
                    ingresoTotal, costoAlquiler, directos, venta, margen,
                    indiferencia: indiferencia.toFixed(1),
                    difIndif: (rinde - indiferencia).toFixed(1),
                    p_alq: getPct(costoAlquiler),
                    p_lab: getPct(costosFijos.labores),
                    p_sem: getPct(costosFijos.semillas),
                    p_insumos: getPct(costosFijos.fertilizantes + costosFijos.agroquimicos),
                    p_venta: getPct(venta),
                    p_mar: getPct(margen)
                };
            }, [rinde, precioVenta, alquilerQq, precioSojaAlquiler]);

            const tickerItems = [
                { s: "SOJA MAY26", v: "314.5", d: "+1.2" },
                { s: "MAIZ JUL26", v: "189.0", d: "-0.5" },
                { s: "TRIGO ENE26", v: "212.0", d: "+0.8" },
                { s: "DLR MAYORISTA", v: "885.4", d: "+0.2" }
            ];

            useEffect(() => { lucide.createIcons(); }, [activeView, activeGrain, calcs]);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* TICKER */}
                    <div className="bg-slate-900 text-white overflow-hidden py-2 border-b border-slate-700">
                        <div className="animate-marquee whitespace-nowrap gap-12 px-4 text-[11px] font-mono">
                            {[...tickerItems, ...tickerItems].map((t, i) => (
                                <span key={i} className="flex items-center gap-2">
                                    <b className="text-slate-400">{t.s}</b> <span className="font-black">{t.v}</span> 
                                    <span className={t.d.includes('+') ? 'text-green-400' : 'text-red-400'}>{t.d}%</span>
                                </span>
                            ))}
                        </div>
                    </div>

                    {/* HEADER */}
                    <header className="bg-white border-b-2 border-slate-100 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-slate-900 text-yellow-400 w-12 h-12 flex items-center justify-center font-black text-2xl border-b-4 border-yellow-400">A</div>
                                <div>
                                    <h1 className="text-2xl font-black uppercase tracking-tighter text-slate-900">Agrinter Cereales</h1>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase">Risk Management</p>
                                </div>
                            </div>
                            <nav className="flex bg-slate-50 p-1 rounded-lg">
                                {['COBERTURAS', 'CALCULADORA', 'INFORMES'].map(v => (
                                    <button key={v} onClick={() => setActiveView(v)}
                                        className={`px-5 py-2 text-[10px] font-black rounded-md transition-all ${activeView === v ? 'bg-slate-900 text-yellow-400' : 'text-slate-400'}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8 flex-grow">
                        {activeView === 'CALCULADORA' && (
                            <div className="animate-in fade-in duration-500">
                                <div className="mb-8 flex justify-between items-end">
                                    <div className="flex bg-slate-900 p-1 rounded-xl">
                                        {['MAIZ 1°', 'MAIZ TARDIO', 'SOJA 1°', 'SOJA 2°'].map(g => (
                                            <button key={g} onClick={() => setActiveGrain(g)}
                                                className={`px-4 py-2 text-[10px] font-black rounded-lg ${activeGrain === g ? 'bg-yellow-400 text-slate-900' : 'text-slate-400'}`}>{g}</button>
                                        ))}
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Margen Bruto</p>
                                        <h2 className={`text-4xl font-black italic ${calcs.margen >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                            {calcs.margen >= 0 ? '+' : ''}u$s {calcs.margen.toFixed(0)} <span className="text-sm font-normal text-slate-400">/ha</span>
                                        </h2>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                    {/* IZQUIERDA */}
                                    <div className="lg:col-span-5 space-y-6">
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-6">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="text-[10px] font-black text-slate-400 uppercase block mb-2">Alquiler (qq)</label>
                                                    <input type="number" value={alquilerQq} onChange={(e) => setAlquilerQq(Number(e.target.value))} className="input-cal bg-slate-50" />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-black text-slate-400 uppercase block mb-2">Precio Venta</label>
                                                    <input type="number" value={precioVenta} onChange={(e) => setPrecioVenta(Number(e.target.value))} className="input-cal bg-slate-50" />
                                                </div>
                                            </div>
                                            <div className="pt-4 border-t border-slate-100">
                                                <div className="flex justify-between items-center mb-4">
                                                    <label className="text-[10px] font-black uppercase tracking-widest">Tu Rinde (qq/ha)</label>
                                                    <span className="bg-slate-900 text-yellow-400 px-3 py-1 rounded-full text-[10px] font-black">Indif: {calcs.indiferencia}</span>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <button onClick={() => setRinde(r => r - 1)} className="w-12 h-12 rounded-xl bg-slate-100 font-black text-xl">-</button>
                                                    <input type="number" value={rinde} onChange={(e) => setRinde(Number(e.target.value))} className="input-cal text-3xl flex-grow" />
                                                    <button onClick={() => setRinde(r => r + 1)} className="w-12 h-12 rounded-xl bg-slate-100 font-black text-xl">+</button>
                                                </div>
                                                <p className={`text-center mt-4 text-[10px] font-black uppercase ${calcs.difIndif >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                    {calcs.difIndif >= 0 ? `+${calcs.difIndif}` : calcs.difIndif} qq sobre indiferencia
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* DERECHA */}
                                    <div className="lg:col-span-7">
                                        <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm h-full">
                                            <div className="text-center mb-6">
                                                <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest">Ingreso Total</p>
                                                <h3 className="text-5xl font-black italic">USD {calcs.ingresoTotal.toLocaleString()} <span className="text-sm font-normal text-slate-400">/ha</span></h3>
                                            </div>

                                            <div className="h-5 w-full flex rounded-full overflow-hidden mb-8 bg-slate-100">
                                                <div className="bg-indigo-500 h-full transition-all" style={{width: `${calcs.p_alq}%`}}></div>
                                                <div className="bg-orange-400 h-full transition-all" style={{width: `${calcs.p_lab}%`}}></div>
                                                <div className="bg-blue-400 h-full transition-all" style={{width: `${calcs.p_sem}%`}}></div>
                                                <div className="bg-yellow-400 h-full transition-all" style={{width: `${calcs.p_insumos}%`}}></div>
                                                <div className="bg-slate-400 h-full transition-all" style={{width: `${calcs.p_venta}%`}}></div>
                                                <div className="bg-green-500 h-full transition-all flex-grow"></div>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-[10px] font-bold uppercase">
                                                <div className="space-y-3">
                                                    <div className="flex justify-between"><span>Alquiler</span><span>u$s {calcs.costoAlquiler.toFixed(0)} ({calcs.p_alq}%)</span></div>
                                                    <div className="flex justify-between"><span>Labores</span><span>u$s {costosFijos.labores} ({calcs.p_lab}%)</span></div>
                                                    <div className="flex justify-between"><span>Semillas</span><span>u$s {costosFijos.semillas} ({calcs.p_sem}%)</span></div>
                                                </div>
                                                <div className="space-y-3 border-l md:pl-8 border-slate-100">
                                                    <div className="flex justify-between"><span>Venta/Flete</span><span>u$s {calcs.venta} ({calcs.p_venta}%)</span></div>
                                                    <div className="flex justify-between text-green-600 font-black text-sm pt-2 border-t"><span>Margen Neto</span><span>u$s {calcs.margen.toFixed(0)}</span></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {activeView === 'COBERTURAS' && (
                            <div className="text-center py-20 text-slate-300 font-black uppercase tracking-[0.3em]">Cargando estrategias de cobertura...</div>
                        )}
                        {activeView === 'INFORMES' && (
                            <div className="text-center py-20 text-slate-300 font-black uppercase tracking-[0.3em]">Acceso a informes exclusivos...</div>
                        )}
                    </main>

                    <footer className="bg-slate-900 text-white py-12 px-6 mt-auto">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] font-black uppercase italic">
                            <p className="text-yellow-400">Agrinter Cereales</p>
                            <p className="text-slate-500 tracking-widest">Maximo Ambrosoni: +54 9 2317 472899</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
