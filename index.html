<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agrinter Cereales - Terminal Unificada</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; }
        .bg-agrinter { background-color: #0f172a; }
        .text-yellow-agrinter { color: #facc15; }
        .border-yellow-agrinter { border-color: #facc15; }
        .hover-yellow:hover { color: #facc15; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeView, setActiveView] = useState('COBERTURAS');
            const [activeGrain, setActiveGrain] = useState('SOJA');

            // Data simulada para el Ticker superior
            const ticker = [
                { s: "SOJA MAY26", v: "325.5", d: "+1.2" },
                { s: "MAIZ JUL26", v: "189.0", d: "-0.5" },
                { s: "TRIGO ENE26", v: "212.0", d: "+0.8" },
                { s: "DLR MAYORISTA", v: "885.4", d: "+0.2" }
            ];

            useEffect(() => { lucide.createIcons(); }, [activeView, activeGrain]);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* TOP TICKER BAR */}
                    <div className="bg-slate-900 text-white overflow-hidden py-1 border-b border-slate-700">
                        <div className="flex animate-marquee whitespace-nowrap gap-8 px-4 text-[10px] font-mono">
                            {ticker.map((t, i) => (
                                <span key={i}>
                                    <b className="text-slate-400">{t.s}</b> {t.v} 
                                    <span className={t.d.includes('+') ? 'text-green-400' : 'text-red-400'}> ({t.d})</span>
                                </span>
                            ))}
                        </div>
                    </div>

                    {/* HEADER ORIGINAL ESTILIZADO */}
                    <header className="bg-white border-b-2 border-slate-100 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-slate-900 text-yellow-400 w-10 h-10 flex items-center justify-center font-black text-xl border-b-2 border-yellow-400 shadow-md">A</div>
                                <div>
                                    <h1 className="text-xl font-black uppercase leading-none tracking-tighter">Agrinter Cereales</h1>
                                    <p className="text-[9px] text-slate-400 font-bold tracking-[0.2em] uppercase">Soluciones Agro-Financieras</p>
                                </div>
                            </div>
                            
                            {/* NAVEGACIÓN DE SUBSITIOS */}
                            <nav className="flex flex-wrap justify-center gap-1">
                                {['COBERTURAS', 'MERCADOS', 'INFORMES', 'INSUMOS', 'LOGISTICA'].map(v => (
                                    <button key={v} onClick={() => setActiveView(v)}
                                        className={`px-4 py-2 text-[10px] font-black tracking-widest transition-all ${activeView === v ? 'bg-slate-900 text-yellow-400' : 'text-slate-400 hover:text-slate-900'}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8 flex-grow w-full">
                        
                        {/* RENDERIZADO CONDICIONAL DE CONTENIDOS */}
                        {activeView === 'COBERTURAS' && (
                            <section className="animate-in fade-in duration-500">
                                <div className="flex justify-between items-end mb-8 border-b border-slate-200 pb-4">
                                    <div>
                                        <h2 className="text-3xl font-black text-slate-900 italic uppercase">Estrategias de Precio</h2>
                                        <p className="text-slate-500 text-xs">Asegure su margen bruto con derivados de MatbaRofex.</p>
                                    </div>
                                    <div className="flex bg-slate-100 p-1 rounded">
                                        {['SOJA', 'TRIGO', 'MAIZ'].map(g => (
                                            <button key={g} onClick={() => setActiveGrain(g)}
                                                className={`px-6 py-2 text-[10px] font-black ${activeGrain === g ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}`}>{g}</button>
                                        ))}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {/* Aquí irían tus tarjetas de siempre, repetidas o mapeadas */}
                                    {[1, 2, 3].map(i => (
                                        <div key={i} className="bg-white border-t-4 border-yellow-400 shadow-xl p-6 relative group overflow-hidden">
                                            <div className="flex justify-between mb-4">
                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Posición {i === 1 ? 'MAY26' : i === 2 ? 'JUL26' : 'NOV26'}</span>
                                                <i data-lucide="trending-up" className="w-4 h-4 text-yellow-500"></i>
                                            </div>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase">Piso Asegurado</p>
                                            <div className="text-6xl font-black text-slate-900 mb-6">32{i}</div>
                                            <button className="w-full bg-slate-900 text-yellow-400 py-4 text-[10px] font-black tracking-widest uppercase hover:bg-yellow-400 hover:text-slate-900 transition-colors">
                                                Operar Cobertura
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {activeView === 'MERCADOS' && (
                            <section className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-in slide-in-from-right duration-500">
                                <div className="lg:col-span-2 space-y-6">
                                    <div className="bg-slate-900 text-white p-6">
                                        <h3 className="font-black italic mb-4">MONITOR DE ARBITRAJE SPOT/FUTURO</h3>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="border border-slate-700 p-4">
                                                <p className="text-[10px] text-slate-500 font-bold uppercase">Maíz Spot</p>
                                                <p className="text-2xl font-black text-yellow-400">u$s 187.5</p>
                                            </div>
                                            <div className="border border-slate-700 p-4">
                                                <p className="text-[10px] text-slate-500 font-bold uppercase">Tasa de Pase TNA</p>
                                                <p className="text-2xl font-black text-green-400">42.5%</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-white border p-6 h-64 flex items-center justify-center">
                                        <p className="text-slate-300 font-black uppercase tracking-widest">[ Gráfico de Curva de Futuros ]</p>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <h4 className="font-black text-xs uppercase border-l-4 border-yellow-400 pl-2">Análisis Técnico</h4>
                                    {[1,2,3].map(n => (
                                        <div key={n} className="bg-white p-4 border text-xs">
                                            <b className="block text-slate-900">MERCADO DE CHICAGO</b>
                                            <p className="text-slate-500">Cierre con tendencia alcista por recortes en Brasil...</p>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {activeView === 'INFORMES' && (
                            <section className="space-y-6">
                                <div className="bg-yellow-400 p-8 text-slate-900">
                                    <h2 className="text-4xl font-black italic uppercase">Agrinter Intelligence</h2>
                                    <p className="font-bold">Reportes exclusivos para clientes sobre clima, mercado y logística.</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="border-2 border-slate-900 p-6 flex justify-between items-center">
                                        <div>
                                            <h4 className="font-black">REPORTE SEMANAL GRANOS</h4>
                                            <p className="text-[10px] text-slate-500 uppercase">PDF • 2.4 MB • 27/04/26</p>
                                        </div>
                                        <i data-lucide="download" className="w-6 h-6"></i>
                                    </div>
                                    <div className="border-2 border-slate-900 p-6 flex justify-between items-center">
                                        <div>
                                            <h4 className="font-black">ESTRATEGIA SINTÉTICOS NOV26</h4>
                                            <p className="text-[10px] text-slate-500 uppercase">PDF • 1.1 MB • 25/04/26</p>
                                        </div>
                                        <i data-lucide="download" className="w-6 h-6"></i>
                                    </div>
                                </div>
                            </section>
                        )}

                        {/* SECCIONES VACÍAS PARA QUE VOS COMPLETES */}
                        {(activeView === 'INSUMOS' || activeView === 'LOGISTICA') && (
                            <div className="h-96 border-4 border-dashed border-slate-200 flex flex-col items-center justify-center">
                                <i data-lucide="construction" className="w-12 h-12 text-slate-300 mb-4"></i>
                                <p className="text-slate-400 font-black uppercase tracking-widest">Módulo {activeView} en desarrollo</p>
                            </div>
                        )}

                    </main>

                    {/* FOOTER ORIGINAL */}
                    <footer className="bg-slate-900 text-white py-12 px-4">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div>
                                <h5 className="text-yellow-400 font-black uppercase mb-4">Agrinter Cereales</h5>
                                <p className="text-[10px] text-slate-400 uppercase leading-relaxed font-bold tracking-wider">
                                    Terminal de Rosario • Buenos Aires • <br/>
                                    Operadores autorizados MatbaRofex.
                                </p>
                            </div>
                            <div className="flex flex-col gap-2">
                                <h5 className="text-white font-black uppercase text-xs mb-2">Contacto Directo</h5>
                                <button className="text-left text-[10px] font-bold text-slate-400 hover:text-yellow-400 transition-colors">MAXIMO AMBROSONI: +54 9 2317 472899</button>
                                <button className="text-left text-[10px] font-bold text-slate-400 hover:text-yellow-400 transition-colors">GONZALO: +54 9 341 0000000</button>
                            </div>
                            <div className="text-right">
                                <p className="text-[9px] font-black text-slate-500 uppercase tracking-[0.4em] italic mb-2">AGRO QUANT v2.5</p>
                                <p className="text-[8px] text-slate-600 uppercase font-bold">© 2026 Todos los derechos reservados.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
