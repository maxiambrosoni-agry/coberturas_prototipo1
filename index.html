<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinter Cereales - Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            useEffect(() => {
                // Esto fuerza a que los iconos de Lucide carguen
                lucide.createIcons();
            }, []);

            return (
                <div className="min-h-screen bg-gray-50 font-sans text-gray-900 pb-20">
                    <header className="bg-white border-b-4 border-yellow-400 shadow-sm p-4 mb-6">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="bg-black p-2 rounded text-yellow-400 font-black text-xl">A</div>
                                <div>
                                    <h1 className="text-xl font-black uppercase leading-none">Agrinter Cereales</h1>
                                    <p className="text-[10px] text-gray-500 font-bold tracking-widest uppercase">Estrategias de Cobertura</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 text-center">
                        <h2 className="text-2xl font-bold mb-4">Cargando Dashboard...</h2>
                        <p className="text-gray-500 italic">Si ves esto, el código ya está corriendo.</p>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
