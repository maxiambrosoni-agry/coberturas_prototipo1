<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinter Cereales - Coberturas</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('Soja');
            const [selectedOperator, setSelectedOperator] = useState('Maximo');
            
            const marketData = {
                Soja: [
                    { mes: 'Julio 2026', futuro: 329, strike: 332, prima: 7, piso: 322, fecha: '23/06/2026' },
                    { mes: 'Noviembre 2026', futuro: 338.5, strike: 340, prima: 12.5, piso: 326, fecha: '23/10/2026' }
                ],
                Trigo: [
                    { mes: 'Diciembre 2026', futuro: 217, strike: 220, prima: 9, piso: 208, fecha: '20/11/2026' }
                ],
                Maiz: [
                    { mes: 'Diciembre 2026', futuro: 194, strike: 196, prima: 7, piso: 187, fecha: '20/11/2026' }
                ]
            };

            const operators = {
                'Gonzalo': { name: 'Gonza', phone: '5493410000000' },
                'Maximo': { name: 'Maximo', phone: '5492317472899' } 
            };

            useEffect(() => { lucide.createIcons(); }, [activeTab]);

            const handleContact = (item) => {
                const op = operators[selectedOperator];
                const msg = `Hola ${op.name}, vi la cobertura de ${activeTab} ${item.mes}. Me interesa recibir mas informacion.`;
                window.open(`https://wa.me/${op.phone}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            return (
                <div className="min-h-screen bg-gray-50 font-sans text-gray-900 pb-20">
                    <header className="bg-white border-b-4 border-yellow-400 shadow-sm p-4 mb-6 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-black text-yellow-400 w-12 h-12 flex items-center justify-center rounded font-black text-2xl">A</div>
                                <div>
                                    <h1 className="text-xl font-black tracking-tight uppercase leading-none">Agrinter Cereales</h1>
                                    <p className="text-[10px] text-gray-500 font-bold tracking-widest uppercase">Estrategias de Cobertura</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                {Object.keys(marketData).map((grain) => (
                                    <button key={grain} onClick={() => setActiveTab(grain)}
                                        className={`px-6 py-1.5 rounded-full text-sm font-bold transition-all ${activeTab === grain ? 'bg-black text-yellow-400 shadow-md' : 'bg-gray-100 text-gray-600 border'}`}>
                                        {grain}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4">
                        <div className="flex justify-center mb-6">
                            <div className="flex bg-gray-100 p-1 rounded-lg">
                                {Object.keys(operators).map(op => (
                                    <button key={op} onClick={() => setSelectedOperator(op)}
                                        className={`px-6 py-2 rounded-md text-xs font-bold transition-all ${selectedOperator === op ? 'bg-white shadow text-black' : 'text-gray-400'}`}>
                                        {op}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {marketData[activeTab].map((item, index) => (
                                <div key={index} className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-lg transition-all">
                                    <div className="bg-yellow-400 px-5 py-4 flex justify-between items-center">
                                        <span className="font-black text-sm uppercase italic">COBERTURA {activeTab.toUpperCase()} {item.mes.toUpperCase()}</span>
                                    </div>
                                    <div className="p-6">
                                        <div className="text-center mb-6">
                                            <p className="text-gray-900 text-[10px] font-bold uppercase tracking-widest mb-1">Piso Asegurado Neto</p>
                                            <div className="text-6xl font-black text-gray-900 tracking-tighter">
                                                <span className="text-2xl mr-1 font-bold">u$d</span>{item.piso}
                                            </div>
                                        </div>
                                        <div className="bg-gray-50 rounded-xl p-5 space-y-3 mb-6 border border-gray-100">
                                            <div className="flex justify-between items-center text-sm">
                                                <span className="text-[11px] font-bold text-gray-500 uppercase">Venta Futuro MtR</span>
                                                <span className="font-bold text-gray-700 italic">u$d {item.futuro}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-sm">
                                                <span className="text-[11px] font-bold text-red-500 uppercase">Costo Seguro (Prima)</span>
                                                <span className="font-bold text-red-500">- u$d {item.prima}</span>
                                            </div>
                                            <div className="pt-2 border-t border-gray-200 flex justify-between items-center text-sm">
                                                <span className="text-[11px] font-bold text-green-600 uppercase">Acompaña suba desde</span>
                                                <span className="font-bold text-green-700 italic">u$d {item.strike}</span>
                                            </div>
                                        </div>
                                        <button onClick={() => handleContact(item)} className="w-full bg-black text-yellow-400 py-4 rounded-xl font-black uppercase tracking-wider hover:bg-gray-800 transition-all flex items-center justify-center gap-3 shadow-lg">
                                            <i data-lucide="message-circle" className="w-5 h-5"></i> Consultar con {operators[selectedOperator].name}
                                        </button>
                                        <div className="text-[10px] text-center text-gray-400 mt-5 italic font-bold uppercase">Válido hasta el {item.fecha}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
