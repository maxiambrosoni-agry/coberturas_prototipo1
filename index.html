<script type="text/babel">
    const { useState, useEffect } = React;

    window.renderApp = (db, auth) => {
        const App = () => {
            const [activeTab, setActiveTab] = useState('Soja');
            // Datos de respaldo para que la página NO quede en blanco nunca
            const [marketData, setMarketData] = useState({
                Soja: [{ mes: 'Julio 2026', futuro: 329, prima: 7, piso: 322 }],
                Trigo: [{ mes: 'Dic 2026', futuro: 217, prima: 9, piso: 208 }],
                Maiz: [{ mes: 'Dic 2026', futuro: 194, prima: 7, piso: 187 }]
            });

            useEffect(() => {
                // Intentar conectar a Firebase, pero mostrar datos igual
                const init = async () => {
                    try {
                        await signInAnonymously(auth);
                        const docRef = doc(db, 'artifacts', 'agrinter-dashboard', 'public', 'data', 'marketValues', 'current');
                        onSnapshot(docRef, (snap) => {
                            if (snap.exists()) setMarketData(snap.data().content);
                        });
                    } catch (e) {
                        console.log("Usando datos locales de respaldo");
                    }
                    // Forzar que aparezcan los iconos
                    setTimeout(() => lucide.createIcons(), 500);
                };
                init();
            }, []);

            return (
                <div className="min-h-screen bg-gray-50 pb-20">
                    <header className="bg-white border-b-4 border-yellow-400 p-4 mb-6 shadow-sm">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="bg-black p-2 rounded text-yellow-400 font-black text-xl">A</div>
                                <div>
                                    <h1 className="text-xl font-black uppercase leading-none text-slate-800">Agrinter Cereales</h1>
                                    <p className="text-[10px] text-gray-500 font-bold tracking-widest uppercase">Estrategias de Cobertura</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                {['Soja', 'Maiz', 'Trigo'].map(g => (
                                    <button key={g} onClick={() => setActiveTab(g)} 
                                        className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${activeTab === g ? 'bg-black text-yellow-400' : 'bg-gray-100 text-gray-400'}`}>
                                        {g}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-6">
                        {marketData[activeTab].map((item, idx) => (
                            <div key={idx} className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden transform transition-all hover:scale-105">
                                <div className="bg-yellow-400 px-5 py-3 font-black text-xs uppercase italic">Cobertura {activeTab} {item.mes}</div>
                                <div className="p-8 text-center">
                                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Piso Asegurado Neto</p>
                                    <div className="text-6xl font-black text-gray-900 tracking-tighter"><span className="text-2xl mr-1 font-bold">u$d</span>{item.piso}</div>
                                </div>
                                <div className="p-6 bg-gray-50 border-t">
                                    <button className="w-full bg-black text-yellow-400 py-4 rounded-xl font-black uppercase text-sm shadow-md flex items-center justify-center gap-2">
                                        <i data-lucide="message-circle" className="w-5 h-5"></i> Consultar
                                    </button>
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    };
</script>
