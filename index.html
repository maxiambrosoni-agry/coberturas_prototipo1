<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agrinter - A3 Real-Time Terminal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #e2e8f0; }
        
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: flex; width: fit-content; animation: marquee 25s linear infinite; }
        
        /* Efecto de parpadeo para datos en tiempo real */
        .price-up { animation: flashGreen 1s ease-out; }
        .price-down { animation: flashRed 1s ease-out; }
        @keyframes flashGreen { 0% { background-color: rgba(34, 197, 94, 0.4); } 100% { background-color: transparent; } }
        @keyframes flashRed { 0% { background-color: rgba(239, 68, 68, 0.4); } 100% { background-color: transparent; } }

        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeView, setActiveView] = useState('MONITOR VIVO');
            const [prices, setPrices] = useState({
                sojaFut: 325.50,
                sojaPut: 4.20,
                sojaCall: 8.50,
                status: 'Conectado a A3'
            });

            // SIMULACIÓN DE WEBSOCKET DE A3 MERCADOS
            useEffect(() => {
                const interval = setInterval(() => {
                    setPrices(prev => ({
                        ...prev,
                        sojaFut: +(prev.sojaFut + (Math.random() - 0.5)).toFixed(2),
                        sojaPut: +(prev.sojaPut + (Math.random() * 0.1 - 0.05)).toFixed(2),
                        sojaCall: +(prev.sojaCall + (Math.random() * 0.1 - 0.05)).toFixed(2)
                    }));
                }, 3000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [activeView, prices]);

            return (
                <div className="min-h-screen flex flex-col">
                    
                    {/* TICKER SUPERIOR */}
                    <div className="bg-black text-yellow-400 py-2 border-b border-yellow-400/20">
                        <div className="animate-marquee whitespace-nowrap gap-12 text-[10px] font-mono tracking-widest uppercase">
                            {[1,2].map(n => (
                                <span key={n} className="flex gap-8">
                                    <span>SOJA MAY26: {prices.sojaFut} <span className="text-green-400">▲</span></span>
                                    <span>DLR MAYORISTA: 885.40</span>
                                    <span>PUT SOJA 320: {prices.sojaPut}</span>
                                    <span>CALL SOJA 340: {prices.sojaCall}</span>
                                    <span>MAIZ JUL26: 189.00 <span className="text-red-400">▼</span></span>
                                </span>
                            ))}
                        </div>
                    </div>

                    <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-yellow-400 text-black flex items-center justify-center font-black text-2xl shadow-[0_0_20px_rgba(250,204,21,0.3)]">A</div>
                                <div>
                                    <h1 className="text-xl font-black uppercase tracking-tighter text-white italic">Agrinter <span className="text-yellow-400">A3 Hub</span></h1>
                                    <div className="flex items-center gap-2">
                                        <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em]">Mesa de Operaciones en Vivo</p>
                                    </div>
                                </div>
                            </div>
                            
                            <nav className="flex gap-1 bg-black/40 p-1 rounded-xl border border-white/5">
                                {['MONITOR VIVO', 'COBERTURAS', 'ESTRATEGIA SINTETICA', 'INFORMES'].map(v => (
                                    <button key={v} onClick={() => setActiveView(v)}
                                        className={`px-4 py-2 text-[10px] font-black rounded-lg transition-all ${activeView === v ? 'bg-yellow-400 text-black' : 'text-slate-400 hover:text-white'}`}>
                                        {v}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8 flex-grow w-full">
                        
                        {activeView === 'MONITOR VIVO' && (
                            <section className="grid grid-cols-1 lg:grid-cols-4 gap-6 animate-in fade-in duration-700">
                                {/* PANEL DE FUTUROS */}
                                <div className="lg:col-span-3 space-y-6">
                                    <div className="glass-panel rounded-3xl p-6 border-l-4 border-l-yellow-400">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black text-white italic uppercase tracking-wider flex items-center gap-2">
                                                <i data-lucide="activity" className="text-yellow-400 w-5 h-5"></i> Monitor A3 Mercados
                                            </h3>
                                            <span className="text-[10px] font-mono text-slate-500 font-bold">ACTUALIZACIÓN: CADA 3 SEG.</span>
                                        </div>
                                        
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-separate border-spacing-y-3">
                                                <thead>
                                                    <tr className="text-[10px] text-slate-500 font-black uppercase tracking-widest">
                                                        <th className="px-4">Producto</th>
                                                        <th className="px-4 text-right">Último</th>
                                                        <th className="px-4 text-right">Bid (Compra)</th>
                                                        <th className="px-4 text-right">Ask (Venta)</th>
                                                        <th className="px-4 text-right">Vol</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="text-sm font-bold uppercase">
                                                    <tr className="bg-white/5 rounded-xl hover:bg-white/10 transition-colors">
                                                        <td className="px-4 py-4 rounded-l-xl border-l border-white/10 italic">Soja MAY26 (Fut)</td>
                                                        <td className={`px-4 text-right text-yellow-400 text-lg transition-all`}>{prices.sojaFut}</td>
                                                        <td className="px-4 text-right text-slate-400">{prices.sojaFut - 0.5}</td>
                                                        <td className="px-4 text-right text-slate-400">{prices.sojaFut + 0.5}</td>
                                                        <td className="px-4 text-right rounded-r-xl">1.450 tn</td>
                                                    </tr>
                                                    <tr className="bg-white/5 rounded-xl hover:bg-white/10 transition-colors">
                                                        <td className="px-4 py-4 rounded-l-xl border-l border-white/10 italic">Call Soja 340</td>
                                                        <td className="px-4 text-right text-green-400 text-lg">{prices.sojaCall}</td>
                                                        <td className="px-4 text-right text-slate-400">{prices.sojaCall - 0.2}</td>
                                                        <td className="px-4 text-right text-slate-400">{prices.sojaCall + 0.2}</td>
                                                        <td className="px-4 text-right rounded-r-xl">850 tn</td>
                                                    </tr>
                                                    <tr className="bg-white/5 rounded-xl hover:bg-white/10 transition-colors">
                                                        <td className="px-4 py-4 rounded-l-xl border-l border-white/10 italic">Put Soja 310</td>
                                                        <td className="px-4 text-right text-red-400 text-lg">{prices.sojaPut}</td>
                                                        <td className="px-4 text-right text-slate-400">{prices.sojaPut - 0.1}</td>
                                                        <td className="px-4 text-right text-slate-400">{prices.sojaPut + 0.1}</td>
                                                        <td className="px-4 text-right rounded-r-xl">2.100 tn</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="glass-panel p-6 rounded-3xl border-t-4 border-t-blue-500">
                                            <h4 className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">¿Qué es el Put Sintético?</h4>
                                            <p className="text-xs text-slate-300 leading-relaxed italic">
                                                "Usted vende su grano físico hoy a precio de mercado y compra un CALL. Si el mercado sube, usted captura la ganancia. Si baja, ya cobró su mercadería. Es la estrategia reina de Chicago aplicada a Rosario."
                                            </p>
                                        </div>
                                        <div className="bg-yellow-400 p-6 rounded-3xl flex flex-col justify-center">
                                            <p className="text-black font-black text-2xl uppercase italic leading-none mb-2">Opere en A3</p>
                                            <p className="text-black/60 text-[10px] font-bold uppercase tracking-widest mb-4">Direct Market Access (DMA)</p>
                                            <button className="bg-black text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-[0.2em]">Abrir Mesa Directa</button>
                                        </div>
                                    </div>
                                </div>

                                {/* SIDEBAR DE ESTADO */}
                                <div className="space-y-6">
                                    <div className="glass-panel p-6 rounded-3xl text-center">
                                        <p className="text-[10px] font-black text-slate-500 uppercase mb-2">Tasa Badlar ARS</p>
                                        <p className="text-3xl font-black text-white leading-none">38.5%</p>
                                        <div className="mt-4 h-1 bg-slate-800 rounded-full overflow-hidden">
                                            <div className="w-2/3 h-full bg-yellow-400"></div>
                                        </div>
                                    </div>
                                    <div className="bg-blue-600 p-6 rounded-3xl shadow-[0_0_30px_rgba(37,99,235,0.3)]">
                                        <i data-lucide="help-circle" className="w-8 h-8 text-white mb-4"></i>
                                        <h5 className="text-white font-black uppercase text-xs mb-2 italic">Asistente de Coberturas</h5>
                                        <p className="text-blue-100 text-[10px] font-bold leading-relaxed">¿No sabe si comprar un PUT o un Sintético? Nuestro algoritmo le ayuda a decidir según su flujo de caja.</p>
                                    </div>
                                </div>
                            </section>
                        )}

                        {activeView === 'ESTRATEGIA SINTETICA' && (
                            <section className="animate-in slide-in-from-bottom-8 duration-500 flex flex-col items-center">
                                <div className="max-w-3xl w-full glass-panel p-10 rounded-[3rem] border-2 border-yellow-400/30">
                                    <div className="text-center mb-10">
                                        <h2 className="text-5xl font-black text-white italic uppercase tracking-tighter mb-2">Put <span className="text-yellow-400">Sintético</span></h2>
                                        <p className="text-slate-500 font-bold uppercase text-[10px] tracking-[0.4em]">Fórmula: Venta Físico + Compra de CALL</p>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                                        <div className="space-y-4">
                                            <label className="text-[10px] font-black text-yellow-400 uppercase">Precio Venta Hoy (Físico)</label>
                                            <input type="text" value="u$s 325" readOnly className="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-white font-black" />
                                        </div>
                                        <div className="space-y-4">
                                            <label className="text-[10px] font-black text-yellow-400 uppercase">Costo Call (Seguro de Alza)</label>
                                            <input type="text" value={`u$s ${prices.sojaCall}`} readOnly className="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-white font-black" />
                                        </div>
                                    </div>

                                    <div className="bg-white/5 p-8 rounded-3xl border border-white/5 mb-8">
                                        <h4 className="text-center font-black text-white uppercase text-xs mb-6">Resultado de la Estrategia</h4>
                                        <div className="flex justify-around items-center">
                                            <div className="text-center">
                                                <p className="text-[9px] text-slate-500 font-bold uppercase mb-1">Piso Cobrado</p>
                                                <p className="text-3xl font-black text-white">316.5</p>
                                            </div>
                                            <div className="h-12 w-px bg-white/10"></div>
                                            <div className="text-center">
                                                <p className="text-[9px] text-slate-500 font-bold uppercase mb-1">Techo de Ganancia</p>
                                                <p className="text-3xl font-black text-green-400">ILIMITADO</p>
                                            </div>
                                        </div>
                                    </div>

                                    <button className="w-full bg-yellow-400 text-black py-6 rounded-2xl font-black uppercase tracking-[0.3em] hover:scale-[1.02] transition-transform">
                                        Solicitar Ejecución en A3
                                    </button>
                                </div>
                            </section>
                        )}

                        {/* SECCIONES EN DESARROLLO */}
                        {(activeView === 'COBERTURAS' || activeView === 'INFORMES') && (
                            <div className="h-96 flex flex-col items-center justify-center opacity-30">
                                <i data-lucide="terminal" className="w-16 h-16 mb-4"></i>
                                <p className="font-black uppercase tracking-[0.5em]">Terminal Data Streaming...</p>
                            </div>
                        )}

                    </main>

                    <footer className="bg-black py-16 px-6 border-t border-white/5">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="text-center md:text-left">
                                <h5 className="text-yellow-400 font-black uppercase text-2xl tracking-tighter italic">Agrinter</h5>
                                <p className="text-[10px] text-slate-600 font-bold uppercase tracking-widest">Connect to A3 Mercados Argentina</p>
                            </div>
                            <div className="flex gap-8 text-[10px] font-black text-slate-500 uppercase">
                                <span className="hover:text-yellow-400 cursor-pointer">Seguridad</span>
                                <span className="hover:text-yellow-400 cursor-pointer">API Docs</span>
                                <span className="hover:text-yellow-400 cursor-pointer">Soporte Técnico</span>
                            </div>
                            <div className="text-right">
                                <p className="text-[10px] font-black text-slate-700 uppercase tracking-widest italic">BUILD: Chicago_Core_v2.7</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
